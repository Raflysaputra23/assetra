<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Konfirmasi Email Anda | Assetra</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: &quot;Poppins&quot;, Arial, sans-serif;
      background-color: #f8f8f8;
      color: #333333;
      line-height: 1.6;
    "
  >
    <table
      width="100%"
      border="0"
      cellspacing="0"
      cellpadding="0"
      role="presentation"
      style="background-color: #f8f8f8"
    >
      <tr>
        <td align="center" style="padding: 20px">
          <table
            width="100%"
            border="0"
            cellspacing="0"
            cellpadding="0"
            role="presentation"
            style="
              max-width: 450px;
              border-radius: 12px;
              background-color: #ffffff;
              border: 1px solid #e0e0e0;
              box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
              text-align: center;
            "
          >
            <tr>
              <td style="padding: 30px">
                <div style="font-size: 48px; color: yellow; margin-bottom: 4px">
                  📧
                </div>

                <h1
                  style="
                    font-size: 28px;
                    font-weight: 600;
                    color: #333333;
                    margin-top: 0;
                    margin-bottom: 15px;
                  "
                >
                  Konfirmasi Email Anda
                </h1>

                <p style="font-size: 15px; color: #555555; margin-bottom: 25px">
                  Terima kasih telah mendaftar di Assetra! Untuk mengaktifkan
                  akun Anda, silakan klik tombol di bawah ini untuk
                  memverifikasi alamat email Anda.
                </p>

                <a
                  href="{{ .ConfirmationURL }}"
                  style="
                    display: inline-block;
                    background-color: yellow;
                    color: #fff;
                    padding: 12px 25px;
                    border-radius: 8px;
                    text-decoration: none;
                    font-weight: 600;
                    font-size: 16px;
                    border: 0;
                  "
                >
                  Verifikasi Email Sekarang
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
